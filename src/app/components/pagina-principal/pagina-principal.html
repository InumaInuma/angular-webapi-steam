<section class="hero">
    <!-- <video class="hero-video" autoplay muted loop playsinline preload="metadata">
        <source src="assets/videos/hero.mp4" type="video/mp4" />
        Tu navegador no soporta video HTML5.
    </video> -->
    <video #videoRef class="hero-video" autoplay muted loop playsinline preload="metadata">
        <source src="/hero.mp4" type="video/mp4" />
        Tu navegador no soporta video HTML5.
    </video>

    <div class="hero-overlay">
        <h1>Bienvenido a Dota Marketplace 🎮</h1>
        <p>Compra, vende e intercambia tus ítems de Dota 2 de forma segura.</p>

        <div class="hero-actions">
            <ng-container *ngIf="isLoggedIn$ | async; else loginBtn">
                <a routerLink="/dota-items" class="btn primary">Ir al Inventario</a>
            </ng-container>
            <ng-template #loginBtn>
                <a routerLink="/login" class="btn primary">Empezar</a>
            </ng-template>
            <a routerLink="/pagina-principal" fragment="marketplace" class="btn outline">Explorar</a>
        </div>
    </div>
</section>
<section class="marketplace" id="marketplace">
    <h2 class="marketplace-title">🛒 Ítems en venta</h2>

    <div class="marketplace-grid">
        <div class="market-card" *ngFor="let item of items">
            <div class="market-image">
                <img [src]="item.iconUrl" [alt]="item.itemName" />
            </div>

            <div class="market-body">
                <h3 class="item-name">{{ item.itemName }}</h3>

                <p class="price">
                    {{ item.currencyCode }} {{ item.price | number:'1.2-2' }}
                </p>

                <p class="seller">
                    👤 {{ item.seller }}
                </p>

                <button class="btn-buy" (click)="buy(item)">
                    Comprar
                </button>
            </div>
        </div>
    </div>
</section>
